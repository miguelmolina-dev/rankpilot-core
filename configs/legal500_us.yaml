  C_feedback:
    description: "Feedback and comments on barristers and other firms."
    state_mapping: "submission.C_feedback"
  D_publishable_information:
    description: "Publishable clients and matters."
    state_mapping: "submission.D_publishable_information"
  E_confidential_information:
    description: "Confidential clients and matters."
    state_mapping: "submission.E_confidential_information"
